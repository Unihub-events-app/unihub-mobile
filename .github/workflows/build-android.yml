name: Build Android

on:
  push:
    tags:
      - "v*"
    branches:
      - Dev
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Dev branch: development build (keeps expo-dev-client) ──────────────
  build-dev:
    if: github.ref == 'refs/heads/Dev'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm ci

      - name: Expo Prebuild
        run: npx expo prebuild --platform android --no-install
        env:
          APP_VARIANT: dev

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Dev APK
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: Upload Dev APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: UniHub-dev-build
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

  # ── Main branch (tags): standalone user-facing release ─────────────────
  build-release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm ci

      - name: Remove expo-dev-client for production build
        run: |
          jq 'del(.dependencies["expo-dev-client"])' package.json > tmp.json && mv tmp.json package.json
          rm -rf node_modules/expo-dev-client

      - name: Expo Prebuild
        run: npx expo prebuild --platform android --no-install
        env:
          EXPO_UPDATES_CHANNEL: production

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Restore signing keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > $HOME/unihub-release.keystore

      - name: Build Release APK
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError"
        run: |
          cd android && ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=$HOME/unihub-release.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Rename APK
        run: cp android/app/build/outputs/apk/release/app-release.apk UniHub-android-${{ github.ref_name }}.apk

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: UniHub-android-${{ github.ref_name }}.apk
          generate_release_notes: true
          name: UniHub Android ${{ github.ref_name }}
          body: |
            ## UniHub Android APK

            **Installation:**
            1. Download the APK file below
            2. On your Android device, enable "Install from unknown sources" in Settings → Security
            3. Open the downloaded APK and install
