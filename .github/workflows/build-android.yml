name: Build Android Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Android APK with EAS
        id: eas-build
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          RAW=$(npx eas-cli@latest build \
            -p android \
            --profile preview \
            --non-interactive \
            --json \
            --no-wait 2>/dev/null)
          echo "$RAW"
          BUILD_ID=$(echo "$RAW" | grep '^\[' | jq -r '.[0].id')
          echo "build_id=$BUILD_ID" >> $GITHUB_OUTPUT

      - name: Wait for build to finish
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          BUILD_ID="${{ steps.eas-build.outputs.build_id }}"
          echo "Polling build $BUILD_ID..."
          while true; do
            RAW=$(npx eas-cli@latest build:list \
              --platform android \
              --json \
              --non-interactive \
              --limit 20 2>/dev/null)
            STATUS=$(echo "$RAW" | grep '^\[' | jq -r --arg id "$BUILD_ID" '.[] | select(.id == $id) | .status')
            echo "Status: $STATUS"
            if [ "$STATUS" = "FINISHED" ]; then
              echo "Build complete."
              break
            elif [ "$STATUS" = "ERRORED" ] || [ "$STATUS" = "CANCELLED" ]; then
              echo "Build failed with status: $STATUS"
              exit 1
            fi
            sleep 30
          done

      - name: Download APK
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          npx eas-cli@latest build:download \
            --id "${{ steps.eas-build.outputs.build_id }}" \
            --path ./release.apk

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release.apk
          generate_release_notes: true
