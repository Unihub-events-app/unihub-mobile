name: Build Android Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm ci

      - name: Remove expo-dev-client for production build
        run: |
          jq 'del(.dependencies["expo-dev-client"])' package.json > tmp.json && mv tmp.json package.json
          rm -rf node_modules/expo-dev-client

      - name: Expo Prebuild (generate native Android project)
        run: npx expo prebuild --platform android --no-install

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk UniHub-android-${{ github.ref_name }}.apk

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: UniHub-android-${{ github.ref_name }}.apk
          generate_release_notes: true
          name: UniHub Android ${{ github.ref_name }}
          body: |
            ## UniHub Android APK

            **Installation:**
            1. Download the APK file below
            2. On your Android device, enable "Install from unknown sources" in Settings → Security
            3. Open the downloaded APK and install

            > This is a debug build for internal testing.
