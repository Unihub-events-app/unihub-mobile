name: Generate Release Keystore (Run Once)

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate keystore
        run: |
          keytool -genkeypair -v \
            -keystore unihub-release.keystore \
            -alias unihub \
            -keyalg RSA -keysize 2048 -validity 36500 \
            -storepass "UniHub@2026!" \
            -keypass "UniHub@2026!" \
            -dname "CN=UniHub,O=UniHub,C=NG"

      - name: Output base64 keystore to job summary
        run: |
          B64=$(base64 -w 0 unihub-release.keystore)
          echo "====== KEYSTORE_BASE64 ======"
          echo "$B64"
          echo "====== KEYSTORE_PASSWORD ======"
          echo "UniHub@2026!"
          echo "====== KEY_ALIAS ======"
          echo "unihub"
          echo "====== KEY_PASSWORD ======"
          echo "UniHub@2026!"
          echo "## Keystore Secrets" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Copy each value below into GitHub → Settings → Secrets → Actions → New repository secret" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### KEYSTORE_BASE64" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "$B64" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### KEYSTORE_PASSWORD" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "UniHub@2026!" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### KEY_ALIAS" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "unihub" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### KEY_PASSWORD" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "UniHub@2026!" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⚠️ After saving all 4 secrets, delete this workflow file from the repo." >> $GITHUB_STEP_SUMMARY
